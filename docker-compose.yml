version: '3.9'

services:
  # ── Development Server ─────────────────────────────────
  app-dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    env_file:
      - .env
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    profiles:
      - dev

  # ── Production Server ──────────────────────────────────
  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: meso-app:latest
    container_name: meso-app-prod
    ports:
      - "80:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    profiles:
      - prod
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  default:
    name: meso-network
